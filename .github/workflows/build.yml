name: Build and Release OpenWrt Package

on:
  push:
    tags:
      - 'v*' # Menggunakan v* agar otomatis jalan untuk v1.9.7, v1.9.8, dst.

permissions:
  contents: write # WAJIB agar bisa upload ke Release

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64_generic, x86_64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: custom_feed
          PACKAGES: luci-app-sms-tool

      - name: Prepare Artifacts
        run: |
          mkdir -p release_files
          # Gunakan -iname agar pencarian tidak sensitif huruf besar/kecil
          # Cari di folder bin/ secara menyeluruh
          find bin/ -type f -iname "luci-app-sms-tool*.ipk" -exec cp {} release_files/ \;
          
          # Beri nama unik berdasarkan arsitektur
          cd release_files
          for f in *.ipk; do 
            [ -e "$f" ] && mv "$f" "${{ matrix.arch }}-$f"
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_files/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
