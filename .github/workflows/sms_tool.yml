name: Build luci-app-sms-tool

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

permissions:
  contents: write # WAJIB agar bot bisa membuat Release

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64_generic]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: custom_feed
          PACKAGES: luci-app-sms-tool
          IGNORE_ERRORS: 1

      - name: Prepare Artifacts
        run: |
          mkdir -p release_files
          # Mencari file .ipk atau .apk di folder bin
          find bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp {} release_files/ \;
          
          cd release_files
          # Rename file agar unik per arsitektur
          for f in *; do
            if [ -f "$f" ]; then
              mv "$f" "${{ matrix.arch }}-$f"
            fi
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          tag_name: latest # Nama release di GitHub
          name: Release Latest Build
          body: |
            Automated build for luci-app-sms-tool.
            Architecture: ${{ matrix.arch }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
