name: Deploy Sms Tool

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Menetapkan folder kerja default untuk semua langkah 'run'
defaults:
  run:
    working-directory: ./luci-app-sms-tool

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Path ke file lock di dalam folder utama
          cache-dependency-path: './luci-app-sms-tool/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ganti 'dist' dengan folder yang muncul (misal: 'build' atau 'out')
          path: './luci-app-sms-tool/build' 

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
