name: Build luci-app-sms-tool

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Memungkinkan menjalankan build secara manual

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tambahkan arsitektur lain sesuai kebutuhan router Anda
        arch: [x86_64, aarch64_generic]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          # Nama feed bebas, 'action' adalah default
          FEEDNAME: custom_feed
          # Menentukan paket yang akan dibangun secara spesifik
          PACKAGES: luci-app-sms-tool
          # Pastikan dependencies tersedia jika tidak ada di feed standar
          IGNORE_ERRORS: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          # Lokasi output IPK di dalam runner
          path: bin/packages/${{ matrix.arch }}/custom_feed/*.ipk
