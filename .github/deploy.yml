name: Deploy ke GitHub Pages

on:
  push:
    branches: ["main"] # Berjalan otomatis saat push ke branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Tentukan folder yang berisi index.html
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
